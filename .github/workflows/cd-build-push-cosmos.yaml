name: Build and push Cosmos image

on:
  push:
    branches:
      - main
    tags:
      - 'twenty/v*'
  workflow_dispatch:
    inputs:
      app_version:
        description: 'APP_VERSION override (e.g. 2.21.0). Defaults to the tag version or the commit sha.'
        required: false

concurrency:
  group: build-push-cosmos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    timeout-minutes: 90
    runs-on: ubuntu-latest
    environment: master
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version and image tags
        id: meta
        env:
          INPUT_VERSION: ${{ inputs.app_version }}
        run: |
          IMAGE=azukaar/twenty-cms-cosmos
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          elif [[ "$GITHUB_REF" == refs/tags/twenty/v* ]]; then
            VERSION="${GITHUB_REF_NAME#twenty/v}"
          else
            VERSION="${GITHUB_SHA::7}"
          fi
          echo "app_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tags=$IMAGE:latest,$IMAGE:$VERSION" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/twenty-docker/twenty/Dockerfile
          target: twenty
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.app_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
